let filter = 'all';

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }

function parseStock(v){
  if(v===''||v===null||v===undefined) return null;
  const n = Number(String(v).replace(/,/g,''));
  return isNaN(n) ? null : n;
}

function render(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let low = 0, miss = 0;
  const q = query.trim().toLowerCase();
  DATA.forEach(r => {
    const stockNum = parseStock(r.stock);
    const isLow = stockNum !== null && stockNum <= 100;
    const isMiss = stockNum === null;
    if(isLow) low++;
    if(isMiss) miss++;
  });
  document.getElementById('stat-total').textContent = DATA.length.toLocaleString();
  document.getElementById('stat-low').textContent = low.toLocaleString();
  document.getElementById('stat-miss').textContent = miss.toLocaleString();
  let visible = 0;
  DATA.forEach(r => {
    const stockNum = parseStock(r.stock);
    const isLow = stockNum !== null && stockNum <= 100;
    const isMiss = stockNum === null;
    if(filter === 'low' && !isLow) return;
    if(filter === 'miss' && !isMiss) return;
    if(q){
      const hay = ((r.sku||'')+' '+(r.name||'')).toLowerCase();
      if(hay.indexOf(q) === -1) return;
    }
    const stockTxt = isMiss ? (r.procode ? '-' : '매칭없음') : stockNum.toLocaleString();
    let cls = 'num';
    if(isLow) cls += ' stock-low';
    else if(isMiss) cls += ' missing';
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>'+escapeHtml(r.sku)+'</td>'+
                   '<td>'+escapeHtml(r.name)+'</td>'+
                   '<td class="num">'+escapeHtml(r.qty)+'</td>'+
                   '<td class="'+cls+'">'+stockTxt+'</td>';
    tbody.appendChild(tr);
    visible++;
  });
}

// ---- 미니 XLSX 생성기 (라이브러리 없음, store-only ZIP) ----
const CRC_TABLE = (()=>{ const t=new Uint32Array(256); for(let n=0;n<256;n++){let c=n; for(let k=0;k<8;k++) c = c&1 ? 0xEDB88320 ^ (c>>>1) : c>>>1; t[n]=c;} return t; })();
function crc32(buf){ let c=0xFFFFFFFF; for(let i=0;i<buf.length;i++) c = CRC_TABLE[(c^buf[i])&0xFF] ^ (c>>>8); return (c^0xFFFFFFFF)>>>0; }
function strBytes(s){ return new TextEncoder().encode(s); }
function buildZip(files){
  const parts=[], central=[]; let offset=0;
  for(const f of files){
    const nb=strBytes(f.name), crc=crc32(f.data), sz=f.data.length;
    const lh=new ArrayBuffer(30), v=new DataView(lh);
    v.setUint32(0,0x04034b50,true); v.setUint16(4,20,true); v.setUint16(8,0,true);
    v.setUint32(14,crc,true); v.setUint32(18,sz,true); v.setUint32(22,sz,true);
    v.setUint16(26,nb.length,true);
    parts.push(new Uint8Array(lh), nb, f.data);
    const ce=new ArrayBuffer(46), cv=new DataView(ce);
    cv.setUint32(0,0x02014b50,true); cv.setUint16(4,20,true); cv.setUint16(6,20,true);
    cv.setUint32(16,crc,true); cv.setUint32(20,sz,true); cv.setUint32(24,sz,true);
    cv.setUint16(28,nb.length,true); cv.setUint32(42,offset,true);
    central.push(new Uint8Array(ce), nb);
    offset += 30 + nb.length + sz;
  }
  const cdSize = central.reduce((s,p)=>s+p.length,0);
  const eo=new ArrayBuffer(22), ev=new DataView(eo);
  ev.setUint32(0,0x06054b50,true); ev.setUint16(8,files.length,true); ev.setUint16(10,files.length,true);
  ev.setUint32(12,cdSize,true); ev.setUint32(16,offset,true);
  const all=[...parts,...central,new Uint8Array(eo)];
  const total=all.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total); let pos=0;
  for(const p of all){ out.set(p,pos); pos+=p.length; }
  return out;
}
function xmlEsc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'})[c]); }
function colLetter(n){ let s=''; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function makeXlsx(headers, rows, widths){
  let cols='<cols>';
  widths.forEach((w,i)=>{ cols += `<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`; });
  cols+='</cols>';
  let data='<sheetData>';
  data += '<row r="1">';
  headers.forEach((h,i)=>{ data += `<c r="${colLetter(i+1)}1" t="inlineStr"><is><t>${xmlEsc(h)}</t></is></c>`; });
  data += '</row>';
  rows.forEach((row,ri)=>{
    const r=ri+2;
    data += `<row r="${r}">`;
    row.forEach((v,i)=>{
      const cr = colLetter(i+1)+r;
      if(typeof v === 'number' && isFinite(v)){
        data += `<c r="${cr}"><v>${v}</v></c>`;
      } else if(v !== null && v !== undefined && v !== ''){
        data += `<c r="${cr}" t="inlineStr"><is><t>${xmlEsc(v)}</t></is></c>`;
      }
    });
    data += '</row>';
  });
  data += '</sheetData>';
  const sheet = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'+cols+data+'</worksheet>';
  const ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
  const rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const wb = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="POR" sheetId="1" r:id="rId1"/></sheets></workbook>';
  const wbRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';
  return buildZip([
    {name:'[Content_Types].xml', data: strBytes(ct)},
    {name:'_rels/.rels', data: strBytes(rels)},
    {name:'xl/workbook.xml', data: strBytes(wb)},
    {name:'xl/_rels/workbook.xml.rels', data: strBytes(wbRels)},
    {name:'xl/worksheets/sheet1.xml', data: strBytes(sheet)}
  ]);
}

document.getElementById('btn-download').onclick = ()=>{
  const q = query.trim().toLowerCase();
  const visible = DATA.filter(r => {
    const stockNum = parseStock(r.stock);
    const isLow = stockNum !== null && stockNum <= 100;
    const isMiss = stockNum === null;
    if(filter === 'low' && !isLow) return false;
    if(filter === 'miss' && !isMiss) return false;
    if(q){
      const hay = ((r.sku||'')+' '+(r.name||'')).toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  const headers = ['SKU ID','SKU명','수량','전산재고'];
  const rows = visible.map(r => {
    const sku = r.sku && !isNaN(Number(r.sku)) ? Number(r.sku) : (r.sku||'');
    const qty = r.qty===''||r.qty==null ? '' : (isNaN(Number(r.qty)) ? r.qty : Number(r.qty));
    const stockNum = parseStock(r.stock);
    const stockOut = stockNum===null ? '' : stockNum;
    return [sku, r.name||'', qty, stockOut];
  });
  const widths = [14, 50, 8, 12];
  const bytes = makeXlsx(headers, rows, widths);
  const blob = new Blob([bytes], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const ts = (META.ts||'').replace(/[^0-9]/g,'').substring(0,12) || new Date().toISOString().replace(/[^0-9]/g,'').substring(0,12);
  const a = document.createElement('a');
  a.href = url; a.download = 'POR_재고확인_'+ts+'.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
};
